let loaded = 0;
function onLoad() {
  loaded++;
  if (loaded === 2) draw();
}
logo.onload = onLoad;
icon.onload = onLoad;

function draw() {
  const c = document.getElementById('c');
  const ctx = c.getContext('2d');
  const W = 1200, H = 630;

  // Fundo
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, W, H);

  // Glow central
  const grd = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 300);
  grd.addColorStop(0, 'rgba(148,202,85,0.08)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Linha verde no topo
  const line = ctx.createLinearGradient(0, 0, W, 0);
  line.addColorStop(0, 'transparent');
  line.addColorStop(0.5, '#94CA55');
  line.addColorStop(1, 'transparent');
  ctx.fillStyle = line;
  ctx.fillRect(0, 0, W, 3);

  // Ícone decorativo à esquerda (opaco)
  ctx.globalAlpha = 0.06;
  const iconH = 500;
  const iconW = icon.width * (iconH / icon.height);
  const iconY = (H - iconH) / 2;
  // Ícone direito espelhado
  ctx.save();
  ctx.translate(W + 60, iconY);
  ctx.scale(-1, 1);
  ctx.drawImage(icon, 0, 0, iconW, iconH);
  ctx.restore();
  ctx.globalAlpha = 1;

  // Logo principal
  const logoH = 160;
  const logoW = logo.width * (logoH / logo.height);
  ctx.drawImage(logo, (W - logoW) / 2, 110, logoW, logoH);

  // Linha 1: "Seu " + "treinador de corrida com IA" (verde)
  const parts = [
    { text: 'Seu ', color: '#e0e0e0', bold: false },
    { text: 'treinador de corrida com IA', color: '#94CA55', bold: true }
  ];
  let totalW1 = 0;
  for (const p of parts) {
    ctx.font = (p.bold ? 'bold' : '500') + ' 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    totalW1 += ctx.measureText(p.text).width;
  }
  let curX = W/2 - totalW1/2;
  for (const p of parts) {
    ctx.font = (p.bold ? 'bold' : '500') + ' 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    ctx.fillStyle = p.color;
    ctx.textAlign = 'left';
    ctx.fillText(p.text, curX, 348);
    curX += ctx.measureText(p.text).width;
  }

  // Linha 2
  ctx.fillStyle = '#e0e0e0';
  ctx.font = '500 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('que treina com você, não pra você', W/2, 392);

  // Sub
  ctx.fillStyle = '#555';
  ctx.font = '400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  ctx.fillText('Plano personalizado · Treinos com base científica · Ajustes automáticos', W/2, 445);

  // URL badge
  ctx.fillStyle = '#444';
  ctx.font = '400 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
  ctx.textAlign = 'right';
  ctx.fillText('ranu.app', W - 40, H - 32);
}

function download() {
  const c = document.getElementById('c');
  const a = document.createElement('a');
  a.download = 'og-image.png';
  a.href = c.toDataURL('image/png');
  a.click();
}
</script>
